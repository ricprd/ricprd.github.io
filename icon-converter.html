<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Converter</title>
<style>
  :root{
    --bg:#f4f6f9; --panel:#ffffff; --ink:#1f2933; --muted:#6b7280;
    --line:#e3e8ef; --accent:#e8443b; --accent-d:#c8382f; --ok:#16a34a;
    --shadow:0 1px 3px rgba(16,24,40,.08),0 1px 2px rgba(16,24,40,.06);
    --radius:12px;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#12161c; --panel:#1b2129; --ink:#e6eaf0; --muted:#94a3b8;
           --line:#2a323d; --shadow:0 1px 3px rgba(0,0,0,.4); }
  }
  *{box-sizing:border-box}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  header{
    padding:22px 24px; border-bottom:1px solid var(--line); background:var(--panel);
    display:flex; align-items:center; gap:14px;
  }
  .logo{
    width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent-d));
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:20px;flex:0 0 auto;
  }
  header h1{font-size:18px;margin:0;font-weight:700}
  header p{margin:0;font-size:12.5px;color:var(--muted)}
  .wrap{max-width:1040px;margin:26px auto;padding:0 20px;display:grid;grid-template-columns:1fr 320px;gap:22px}
  @media (max-width:840px){.wrap{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card .hd{padding:14px 18px;border-bottom:1px solid var(--line);font-weight:600;font-size:14px}
  .card .bd{padding:18px}

  /* Dropzone */
  #drop{
    border:2px dashed var(--line);border-radius:var(--radius);padding:46px 20px;text-align:center;
    cursor:pointer;transition:.15s;background:transparent;
  }
  #drop.hover{border-color:var(--accent);background:rgba(232,68,59,.05)}
  #drop svg{width:46px;height:46px;color:var(--muted);margin-bottom:10px}
  #drop b{color:var(--accent)}
  #drop small{display:block;color:var(--muted);margin-top:6px;font-size:12px}

  /* Preview */
  .previews{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;margin-top:18px}
  .pv{text-align:center}
  .pv .box{
    background:
      linear-gradient(45deg,#0002 25%,transparent 25%,transparent 75%,#0002 75%),
      linear-gradient(45deg,#0002 25%,transparent 25%,transparent 75%,#0002 75%);
    background-size:14px 14px;background-position:0 0,7px 7px;
    border:1px solid var(--line);border-radius:8px;padding:8px;display:inline-block;
  }
  .pv canvas{display:block;image-rendering:pixelated}
  .pv span{display:block;font-size:11px;color:var(--muted);margin-top:5px}

  label.row{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13.5px;margin:12px 0}
  .sizes{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .sizes label{display:flex;align-items:center;gap:8px;font-size:13px;padding:7px 9px;border:1px solid var(--line);border-radius:8px;cursor:pointer}
  .sizes label:hover{border-color:var(--accent)}
  input[type=range]{width:150px;accent-color:var(--accent)}
  input[type=color]{width:38px;height:26px;border:1px solid var(--line);border-radius:6px;background:none;padding:0;cursor:pointer}
  .val{font-variant-numeric:tabular-nums;color:var(--muted);font-size:12px;min-width:38px;text-align:right}
  select{padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--ink);font-size:13px}

  button.btn{
    width:100%;padding:12px;border:0;border-radius:9px;font-size:14.5px;font-weight:700;cursor:pointer;
    background:var(--accent);color:#fff;transition:.15s;margin-top:6px;
  }
  button.btn:hover{background:var(--accent-d)}
  button.btn:disabled{opacity:.45;cursor:not-allowed}
  button.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);margin-top:8px}
  button.ghost:hover{background:var(--bg)}
  .note{font-size:11.5px;color:var(--muted);margin-top:14px;text-align:center}
  .toggle{display:flex;align-items:center;gap:8px}
  .switch{position:relative;width:38px;height:22px;flex:0 0 auto}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:var(--line);border-radius:22px;transition:.15s;cursor:pointer}
  .slider:before{content:"";position:absolute;height:16px;width:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
  .switch input:checked+.slider{background:var(--accent)}
  .switch input:checked+.slider:before{transform:translateX(16px)}
  .hint{font-size:12px;color:var(--muted);margin:2px 0 0}
</style>
</head>
<body>
<div class="wrap">
  <!-- LEFT: input + preview -->
  <div class="card">
    <div class="hd">Source image</div>
    <div class="bd">
      <div id="drop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 16V4m0 0L8 8m4-4l4 4M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
        <div><b>Click to browse</b> or drag &amp; drop an image</div>
        <small>PNG, JPEG, WEBP, GIF, BMP, SVG</small>
      </div>
      <input id="file" type="file" accept="image/*,.svg" hidden>
      <div id="previewArea" style="display:none">
        <div class="previews" id="previews"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT: options -->
  <div class="card">
    <div class="hd">Options</div>
    <div class="bd">
      <div style="font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">Sizes to include</div>
      <div class="sizes" id="sizes"></div>

      <hr style="border:0;border-top:1px solid var(--line);margin:16px 0">

      <label class="row">Background
        <span class="toggle">
          <input type="color" id="bg" value="#ffffff">
          <label class="switch"><input type="checkbox" id="bgOn"><span class="slider"></span></label>
        </span>
      </label>
      <p class="hint" style="margin-top:-6px">Off = transparent background</p>

      <label class="row">Rounded corners
        <span style="display:flex;align-items:center;gap:8px">
          <input type="range" id="radius" min="0" max="50" value="0">
          <span class="val" id="radiusV">0%</span>
        </span>
      </label>

      <label class="row">Padding
        <span style="display:flex;align-items:center;gap:8px">
          <input type="range" id="pad" min="0" max="40" value="0">
          <span class="val" id="padV">0%</span>
        </span>
      </label>

      <label class="row">Scaling
        <select id="fit">
          <option value="contain">Contain (fit)</option>
          <option value="cover">Cover (fill)</option>
          <option value="stretch">Stretch</option>
        </select>
      </label>

      <label class="row">Image Format
        <select id="format">
          <option value="bmp4">BMP (4-bit)</option>
          <option value="bmp8">BMP (8-bit)</option>
          <option value="bmp24">BMP (24-bit)</option>
          <option value="bmp32" selected>BMP (32-bit)</option>
          <option value="png">PNG</option>
        </select>
      </label>
      <p class="hint" style="margin-top:-6px">32-bit BMP = true color + transparency (most reliable). 4/8-bit reduce colors; 24-bit drops alpha.</p>

      <button class="btn" id="dl" disabled>Download .ico</button>
      <button class="ghost btn" id="pngBtn" disabled>Download largest as .png</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var ALL_SIZES = [16,24,32,48,64,96,128,256];
  var DEFAULT_ON = {16:true,24:true,32:true,48:true,64:true,96:true,128:true,256:true};
  var srcImg = null;      // HTMLImageElement (loaded source)
  var srcName = "icon";

  var el = function(id){return document.getElementById(id);};
  var drop=el('drop'), file=el('file'), previews=el('previews'), previewArea=el('previewArea');
  var bg=el('bg'), bgOn=el('bgOn'), radius=el('radius'), radiusV=el('radiusV');
  var pad=el('pad'), padV=el('padV'), fit=el('fit'), dl=el('dl'), pngBtn=el('pngBtn');

  // build size checkboxes
  var sizesWrap = el('sizes');
  ALL_SIZES.forEach(function(s){
    var l=document.createElement('label');
    l.innerHTML='<input type="checkbox" value="'+s+'" '+(DEFAULT_ON[s]?'checked':'')+'> '+s+' × '+s+' px';
    l.querySelector('input').addEventListener('change', render);
    sizesWrap.appendChild(l);
  });

  function selectedSizes(){
    return Array.prototype.slice.call(sizesWrap.querySelectorAll('input:checked'))
      .map(function(i){return parseInt(i.value,10);})
      .sort(function(a,b){return a-b;});
  }

  // ---- file handling ----
  drop.addEventListener('click', function(){ file.click(); });
  file.addEventListener('change', function(e){ if(e.target.files[0]) loadFile(e.target.files[0]); });
  ['dragenter','dragover'].forEach(function(ev){
    drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.add('hover'); });
  });
  ['dragleave','drop'].forEach(function(ev){
    drop.addEventListener(ev, function(e){ e.preventDefault(); drop.classList.remove('hover'); });
  });
  drop.addEventListener('drop', function(e){
    var f = e.dataTransfer.files[0]; if(f) loadFile(f);
  });

  function loadFile(f){
    srcName = (f.name||'icon').replace(/\.[^.]+$/,'') || 'icon';
    var reader = new FileReader();
    reader.onload = function(){
      var img = new Image();
      img.onload = function(){ srcImg = img; previewArea.style.display='block'; render(); };
      img.onerror = function(){ alert('Could not load that image.'); };
      img.src = reader.result;
    };
    reader.readAsDataURL(f);
  }

  // ---- draw one size to a canvas ----
  function drawSize(size){
    var c = document.createElement('canvas');
    c.width = c.height = size;
    var ctx = c.getContext('2d');
    ctx.clearRect(0,0,size,size);

    var r = parseInt(radius.value,10)/100 * size/2;   // corner radius in px
    var padPx = parseInt(pad.value,10)/100 * size;
    var inner = size - padPx*2;

    // rounded-rect clip
    ctx.save();
    roundRect(ctx, 0, 0, size, size, r);
    ctx.clip();

    // background
    if(bgOn.checked){ ctx.fillStyle = bg.value; ctx.fillRect(0,0,size,size); }

    // compute source draw rect
    var iw=srcImg.naturalWidth||srcImg.width, ih=srcImg.naturalHeight||srcImg.height;
    var dw, dh, dx, dy;
    var mode = fit.value;
    if(mode==='stretch'){ dw=inner; dh=inner; }
    else {
      var scale = (mode==='cover') ? Math.max(inner/iw, inner/ih) : Math.min(inner/iw, inner/ih);
      dw = iw*scale; dh = ih*scale;
    }
    dx = (size-dw)/2; dy = (size-dh)/2;
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(srcImg, dx, dy, dw, dh);
    ctx.restore();
    return c;
  }

  function roundRect(ctx,x,y,w,h,r){
    r = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  // ---- render previews ----
  function render(){
    radiusV.textContent = radius.value+'%';
    padV.textContent = pad.value+'%';
    if(!srcImg){ dl.disabled=true; pngBtn.disabled=true; return; }
    previews.innerHTML='';
    var sizes = selectedSizes();
    var showSizes = sizes.length?sizes:[32];
    // show up to a few representative previews
    var toShow = sizes.length ? sizes : [];
    toShow.forEach(function(s){
      var c = drawSize(s);
      var wrap=document.createElement('div'); wrap.className='pv';
      var box=document.createElement('div'); box.className='box';
      var disp=s>128?128:s; c.style.width=disp+'px'; c.style.height=disp+'px';
      box.appendChild(c);
      var span=document.createElement('span'); span.textContent=s+'px';
      wrap.appendChild(box); wrap.appendChild(span); previews.appendChild(wrap);
    });
    var has = sizes.length>0;
    dl.disabled = !has; pngBtn.disabled = !has;
  }

  ['input','change'].forEach(function(ev){
    [bg,bgOn,radius,pad,fit].forEach(function(node){ node.addEventListener(ev, render); });
  });

  // ---- build ICO ----
  function canvasToPngBytes(c){
    return new Promise(function(res){
      c.toBlob(function(blob){
        var fr=new FileReader();
        fr.onload=function(){ res(new Uint8Array(fr.result)); };
        fr.readAsArrayBuffer(blob);
      },'image/png');
    });
  }

  // Median-cut color quantizer → returns a palette of up to maxColors and a
  // cached nearest-color lookup. Used by the 4-bit and 8-bit BMP formats.
  function quantize(data, maxColors){
    var pixels = [];
    for(var i=0;i<data.length;i+=4){
      if(data[i+3] >= 128) pixels.push([data[i],data[i+1],data[i+2]]);
    }
    if(!pixels.length) pixels.push([0,0,0]);
    function rangeAxis(box){
      var mn=[255,255,255], mx=[0,0,0];
      for(var p=0;p<box.length;p++){ var px=box[p];
        for(var k=0;k<3;k++){ if(px[k]<mn[k])mn[k]=px[k]; if(px[k]>mx[k])mx[k]=px[k]; } }
      var rg=[mx[0]-mn[0],mx[1]-mn[1],mx[2]-mn[2]];
      var a=0; if(rg[1]>rg[a])a=1; if(rg[2]>rg[a])a=2;
      return {axis:a, range:rg[a]};
    }
    var boxes=[pixels];
    while(boxes.length < maxColors){
      var bi=-1, best=-1, bax=0;
      for(var j=0;j<boxes.length;j++){
        if(boxes[j].length<2) continue;
        var ra=rangeAxis(boxes[j]);
        if(ra.range>best){ best=ra.range; bi=j; bax=ra.axis; }
      }
      if(bi<0) break;
      var box=boxes[bi];
      box.sort(function(a,b){return a[bax]-b[bax];});
      var mid=box.length>>1;
      boxes.splice(bi,1, box.slice(0,mid), box.slice(mid));
    }
    var palette=boxes.map(function(box){
      var s=[0,0,0]; for(var p=0;p<box.length;p++){ s[0]+=box[p][0]; s[1]+=box[p][1]; s[2]+=box[p][2]; }
      var n=box.length; return [Math.round(s[0]/n),Math.round(s[1]/n),Math.round(s[2]/n)];
    });
    var cache=new Map();
    function nearest(r,g,b){
      var key=(r<<16)|(g<<8)|b, c=cache.get(key);
      if(c!==undefined) return c;
      var bi=0, bd=Infinity;
      for(var i=0;i<palette.length;i++){
        var dr=r-palette[i][0], dg=g-palette[i][1], db=b-palette[i][2];
        var d=dr*dr+dg*dg+db*db;
        if(d<bd){ bd=d; bi=i; }
      }
      cache.set(key,bi); return bi;
    }
    return { palette:palette, nearest:nearest };
  }

  // Encode a canvas as an uncompressed BMP/DIB frame at the given bit depth
  // (4, 8, 24, or 32). This is the reliable, universally-readable ICO format.
  function canvasToBmpBytes(c, size, depth){
    var ctx = c.getContext('2d');
    var data = ctx.getImageData(0,0,size,size).data;   // RGBA, top-down
    var HEADER = 40;
    var palCount = depth<=8 ? (1<<depth) : 0;
    var palSize  = palCount*4;
    var xorRow = depth===32 ? size*4
               : depth===24 ? ((size*3+3)&~3)
               : depth===8  ? ((size+3)&~3)
               :              (((size+1)>>1)+3)&~3;   // 4-bit: 2 px per byte
    var xorSize = xorRow*size;
    var andRow  = ((size+31)>>5)*4;                   // 1bpp mask, 32-bit padded rows
    var andSize = andRow*size;
    var buf = new ArrayBuffer(HEADER + palSize + xorSize + andSize);
    var dv = new DataView(buf);
    var bytes = new Uint8Array(buf);

    // BITMAPINFOHEADER
    dv.setUint32(0, 40, true);
    dv.setInt32(4, size, true);
    dv.setInt32(8, size*2, true);                     // XOR + AND stacked
    dv.setUint16(12, 1, true);
    dv.setUint16(14, depth, true);
    dv.setUint32(16, 0, true);                        // BI_RGB
    dv.setUint32(20, xorSize + andSize, true);        // biSizeImage
    if(depth<=8) dv.setUint32(32, palCount, true);    // biClrUsed

    var q = depth<=8 ? quantize(data, palCount) : null;

    // palette (BGR0)
    var off = HEADER;
    if(q){
      for(var p=0;p<palCount;p++){
        var col = q.palette[p] || [0,0,0];
        bytes[off++]=col[2]; bytes[off++]=col[1]; bytes[off++]=col[0]; bytes[off++]=0;
      }
    }

    // XOR color data, rows bottom-up, each row padded to xorRow
    for(var y=size-1; y>=0; y--){
      var rowStart = off;
      if(depth===32){
        for(var x=0;x<size;x++){ var i=(y*size+x)*4;
          bytes[off++]=data[i+2]; bytes[off++]=data[i+1]; bytes[off++]=data[i]; bytes[off++]=data[i+3]; }
      } else if(depth===24){
        for(var x=0;x<size;x++){ var i=(y*size+x)*4;
          bytes[off++]=data[i+2]; bytes[off++]=data[i+1]; bytes[off++]=data[i]; }
      } else if(depth===8){
        for(var x=0;x<size;x++){ var i=(y*size+x)*4;
          bytes[off++] = data[i+3]<128 ? 0 : q.nearest(data[i],data[i+1],data[i+2]); }
      } else { // 4-bit: pack two pixels per byte, high nibble first
        for(var x=0;x<size;x+=2){
          var i=(y*size+x)*4;
          var hi = data[i+3]<128 ? 0 : q.nearest(data[i],data[i+1],data[i+2]);
          var lo = 0;
          if(x+1<size){ var jj=(y*size+x+1)*4; lo = data[jj+3]<128 ? 0 : q.nearest(data[jj],data[jj+1],data[jj+2]); }
          bytes[off++] = ((hi&0xF)<<4)|(lo&0xF);
        }
      }
      off = rowStart + xorRow;   // apply row padding
    }

    // AND transparency mask (bit=1 → transparent). For 32-bit, alpha carries
    // transparency and the mask stays zero (matches the reliable-tool output);
    // for the alpha-less depths the mask is where transparency lives.
    if(depth<32){
      var andStart = HEADER + palSize + xorSize;
      for(var y2=size-1, row=0; y2>=0; y2--, row++){
        var rb = andStart + row*andRow;
        for(var x2=0;x2<size;x2++){
          var ii=(y2*size+x2)*4;
          if(data[ii+3]<128) bytes[rb+(x2>>3)] |= (0x80>>(x2&7));
        }
      }
    }
    return bytes;
  }

  function buildIco(frames, sizes, bpp){
    // frames: array of Uint8Array frame data; sizes: pixel sizes; bpp: bit depth
    var n = frames.length;
    var header = 6, dirEntry = 16;
    var offset = header + dirEntry*n;
    var totalData = frames.reduce(function(a,p){return a+p.length;},0);
    var buf = new ArrayBuffer(offset + totalData);
    var dv = new DataView(buf);
    var bytes = new Uint8Array(buf);

    // ICONDIR
    dv.setUint16(0, 0, true);   // reserved
    dv.setUint16(2, 1, true);   // type: icon
    dv.setUint16(4, n, true);   // count

    var dataOff = offset;
    for(var i=0;i<n;i++){
      var s = sizes[i];
      var eo = header + dirEntry*i;
      bytes[eo+0] = s>=256?0:s;   // width  (0 => 256)
      bytes[eo+1] = s>=256?0:s;   // height
      bytes[eo+2] = bpp<=8 ? (1<<bpp) : 0;  // palette color count
      bytes[eo+3] = 0;            // reserved
      dv.setUint16(eo+4, 1, true);      // color planes
      dv.setUint16(eo+6, bpp, true);    // bits per pixel
      dv.setUint32(eo+8, frames[i].length, true);  // size of data
      dv.setUint32(eo+12, dataOff, true);          // offset of data
      bytes.set(frames[i], dataOff);
      dataOff += frames[i].length;
    }
    return new Blob([buf], {type:'image/x-icon'});
  }

  function download(blob, name){
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href=url; a.download=name; document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 100);
  }

  dl.addEventListener('click', function(){
    var sizes = selectedSizes();
    if(!sizes.length || !srcImg) return;
    dl.disabled=true; dl.textContent='Building…';
    var fmt = el('format').value;                 // bmp32 | bmp24 | bmp8 | bmp4 | png
    var depth = fmt==='png' ? 32 : parseInt(fmt.replace('bmp',''),10);
    Promise.all(sizes.map(function(s){
      var c = drawSize(s);
      return fmt==='png'
        ? canvasToPngBytes(c)
        : Promise.resolve(canvasToBmpBytes(c, s, depth));
    }))
      .then(function(frames){
        var blob = buildIco(frames, sizes, depth);
        download(blob, srcName+'.ico');
        dl.textContent='Download .ico'; dl.disabled=false;
      });
  });

  pngBtn.addEventListener('click', function(){
    var sizes = selectedSizes();
    if(!sizes.length || !srcImg) return;
    var big = sizes[sizes.length-1];
    drawSize(big).toBlob(function(blob){ download(blob, srcName+'-'+big+'.png'); },'image/png');
  });

  render();
})();
</script>
</body>
</html>
