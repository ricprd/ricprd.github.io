<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog image resizer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inconsolata:wght@400;500;700&display=swap');

:root {
  --bg: #f5f2ed;
  --bg2: #ede9e2;
  --bg3: #e4dfd7;
  --ink: #1a1714;
  --ink2: #4a453f;
  --ink3: #8a837a;
  --rule: #d4cec5;
  --accent: #c84b2f;
  --accent-bg: rgba(200,75,47,0.08);
  --green: #2a7a4f;
  --green-bg: rgba(42,122,79,0.08);
  --sans: 'Syne', sans-serif;
  --mono: 'Inconsolata', monospace;
  --radius: 3px;
  --shadow: 0 1px 3px rgba(26,23,20,0.08), 0 4px 16px rgba(26,23,20,0.04);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  min-height: 100vh;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }

.page {
  max-width: 980px;
  margin: 0 auto;
  padding: 0 28px 80px;
}

header {
  padding: 36px 0 28px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  border-bottom: 2px solid var(--ink);
  margin-bottom: 40px;
}
.brand-name {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1;
}
.brand-name span { color: var(--accent); }
.brand-sub {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink3);
  letter-spacing: 0.08em;
  margin-top: 4px;
}

/* Dropzone */
#dropzone {
  border: 2px dashed var(--rule);
  border-radius: 6px;
  padding: 44px 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  margin-bottom: 36px;
  background: var(--bg2);
}
#dropzone:hover,
#dropzone.drag-over {
  border-color: var(--accent);
  background: var(--accent-bg);
}
.dz-glyph { font-size: 38px; opacity: 0.25; margin-bottom: 12px; font-family: var(--mono); }
.dz-label { font-size: 15px; font-weight: 700; color: var(--ink2); margin-bottom: 5px; }
.dz-hint  { font-family: var(--mono); font-size: 11px; color: var(--ink3); letter-spacing: 0.04em; margin-bottom: 16px; }
.pick-btn {
  display: inline-block;
  padding: 9px 22px;
  background: var(--ink);
  color: var(--bg);
  border: none;
  border-radius: var(--radius);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: background 0.15s;
}
.pick-btn:hover { background: var(--accent); }

/* Workspace */
.workspace {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 28px;
  align-items: start;
}

/* Settings card */
.settings-card {
  background: var(--bg);
  border: 1.5px solid var(--rule);
  border-radius: 6px;
  overflow: hidden;
  box-shadow: var(--shadow);
  position: sticky;
  top: 20px;
}
.card-title {
  padding: 12px 16px;
  background: var(--ink);
  color: #f5f2ed;
  font-size: 10px;
  font-family: var(--mono);
  letter-spacing: 0.16em;
  text-transform: uppercase;
}
.settings-body { padding: 20px 16px; }
.s-group { margin-bottom: 22px; }
.s-group:last-child { margin-bottom: 0; }
.s-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ink3);
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}
.s-hint {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink3);
  margin-top: 5px;
}
.s-divider { height: 1px; background: var(--rule); margin: 18px 0; }

/* Dimension inputs */
.dim-row { display: grid; grid-template-columns: 1fr 14px 1fr; align-items: center; gap: 6px; }
.dim-x { text-align: center; font-family: var(--mono); font-size: 13px; color: var(--ink3); }
.px-wrap { position: relative; }
.px-wrap input { padding-right: 28px; }
.px-wrap::after {
  content: 'px';
  position: absolute; right: 9px; top: 50%;
  transform: translateY(-50%);
  font-family: var(--mono); font-size: 10px; color: var(--ink3);
  pointer-events: none;
}

/* Text + number inputs */
input[type=number], input[type=text] {
  width: 100%;
  background: var(--bg2);
  border: 1.5px solid var(--rule);
  border-radius: var(--radius);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 14px;
  padding: 8px 10px;
  outline: none;
  transition: border-color 0.15s;
  -moz-appearance: textfield;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
input:focus { border-color: var(--accent); background: #fff; }

/* Rename preview */
.rename-preview {
  font-family: var(--mono); font-size: 10px; color: var(--ink3);
  margin-top: 6px; padding: 5px 8px;
  background: var(--bg3); border-radius: var(--radius);
}
.rename-preview strong { color: var(--accent); }

/* Format segmented control */
.seg-ctrl {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border: 1.5px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
}
.seg-ctrl input[type=radio] { display: none; }
.seg-ctrl label {
  padding: 8px;
  text-align: center;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--ink3);
  cursor: pointer;
  background: var(--bg2);
  transition: background 0.15s, color 0.15s;
  border-right: 1.5px solid var(--rule);
}
.seg-ctrl label:last-of-type { border-right: none; }
.seg-ctrl input[type=radio]:checked + label {
  background: var(--ink);
  color: var(--bg);
}

/* Quality slider */
.quality-wrap { margin-top: 14px; }
.q-row { display: flex; align-items: center; gap: 10px; }
input[type=range] {
  flex: 1; -webkit-appearance: none;
  background: var(--rule); height: 3px; border-radius: 2px;
  outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px;
  background: var(--accent); border-radius: 50%;
  border: 2px solid #fff;
  box-shadow: 0 1px 4px rgba(200,75,47,0.3);
  cursor: pointer; transition: transform 0.1s;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
.q-val { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--accent); width: 30px; text-align: right; flex-shrink: 0; }

/* Process button */
#btn-process {
  width: 100%; margin-top: 20px; padding: 13px;
  background: var(--ink); color: var(--bg);
  border: none; border-radius: var(--radius);
  font-family: var(--sans); font-size: 13px; font-weight: 700;
  letter-spacing: 0.06em; cursor: pointer;
  position: relative; overflow: hidden;
  transition: background 0.2s, transform 0.1s;
}
#btn-process:hover:not(:disabled) { background: var(--accent); }
#btn-process:active:not(:disabled) { transform: scale(0.98); }
#btn-process:disabled { opacity: 0.35; cursor: not-allowed; }
#btn-process .prog {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: rgba(255,255,255,0.1); width: 0%;
  transition: width 0.25s; pointer-events: none;
}

/* File list */
.list-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.list-title {
  font-size: 10px; font-family: var(--mono); letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink3);
  display: flex; align-items: center; gap: 8px;
}
.n-badge {
  background: var(--ink); color: var(--bg);
  font-size: 9px; font-family: var(--mono);
  padding: 2px 6px; border-radius: 10px;
}
.n-badge.has { background: var(--accent); }
.clear-btn {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.06em;
  background: none; border: none; color: var(--ink3); cursor: pointer;
  transition: color 0.15s; padding: 2px;
}
.clear-btn:hover { color: var(--accent); }

.empty-state {
  border: 1.5px dashed var(--rule); border-radius: 6px;
  padding: 60px 20px; text-align: center; background: var(--bg2);
}
.empty-glyph { font-family: var(--mono); font-size: 28px; opacity: 0.2; margin-bottom: 10px; }
.empty-text  { font-family: var(--mono); font-size: 11px; color: var(--ink3); letter-spacing: 0.08em; }

.img-list { display: flex; flex-direction: column; gap: 6px; }
.img-row {
  background: #fff; border: 1.5px solid var(--rule); border-radius: 5px;
  display: grid; grid-template-columns: 58px 1fr auto;
  align-items: center; gap: 12px; padding: 10px 12px;
  box-shadow: var(--shadow);
  animation: fadeUp 0.18s ease;
  transition: border-color 0.2s;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.img-row.done { border-left: 3px solid var(--green); }

.thumb { width: 58px; height: 44px; object-fit: cover; border-radius: 3px; background: var(--bg3); display: block; }
.img-info { min-width: 0; }
.img-name { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
.img-out  { font-family: var(--mono); font-size: 10px; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.img-meta { font-family: var(--mono); font-size: 10px; color: var(--ink3); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.tag { padding: 1px 5px; border-radius: 2px; border: 1px solid var(--rule); font-size: 9px; letter-spacing: 0.05em; color: var(--ink3); }
.tag.done { border-color: var(--green); color: var(--green); background: var(--green-bg); }

.row-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--rule); transition: background 0.3s; }
.status-dot.processing { background: #f5c518; animation: blink 0.7s ease infinite; }
.status-dot.done  { background: var(--green); }
.status-dot.error { background: var(--accent); }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

.act-btn {
  background: none; border: 1.5px solid var(--rule); border-radius: var(--radius);
  color: var(--ink3); font-family: var(--mono); font-size: 10px;
  padding: 3px 8px; cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  white-space: nowrap; letter-spacing: 0.04em;
}
.act-btn.rm:hover { border-color: var(--accent); color: var(--accent); }

@media (max-width: 680px) {
  .workspace { grid-template-columns: 1fr; }
  .settings-card { position: static; }
  header { flex-wrap: wrap; gap: 12px; }
}
</style>
</head>
<body>
<div class="page">

  <header>
    <div>
      <div class="brand-name">blog<span>//</span>resize</div>
    </div>
  </header>

  <div id="dropzone">
    <input type="file" id="file-input" accept="image/*" multiple style="display:none">
    <div class="dz-glyph">[ + ]</div>
    <div class="dz-label">Drop images here</div>
    <div class="dz-hint">PNG &middot; JPG &middot; WEBP &middot; GIF &middot; BMP</div>
    <button class="pick-btn" id="pick-btn" type="button">Choose files&hellip;</button>
  </div>

  <div class="workspace">

    <div class="settings-card">
      <div class="card-title">Settings</div>
      <div class="settings-body">

        <div class="s-group">
          <span class="s-label">Dimensions</span>
          <div class="dim-row">
            <div class="px-wrap"><input type="number" id="g-w" placeholder="width"  min="1" max="99999"></div>
            <span class="dim-x">&times;</span>
            <div class="px-wrap"><input type="number" id="g-h" placeholder="height" min="1" max="99999"></div>
          </div>
          <div class="s-hint">One blank &rarr; proportional scale</div>
        </div>

        <div class="s-divider"></div>

        <div class="s-group">
          <span class="s-label">Rename</span>
          <input type="text" id="rename-base" placeholder="e.g. my-blog-post">
          <div class="rename-preview" id="rename-preview">&rarr; <strong>image-1</strong>.jpg, <strong>image-2</strong>.jpg &hellip;</div>
        </div>

        <div class="s-divider"></div>

        <div class="s-group">
          <span class="s-label">Output format</span>
          <div class="seg-ctrl">
            <input type="radio" name="fmt" id="fmt-jpg" value="jpg" checked>
            <label for="fmt-jpg">JPG</label>
            <input type="radio" name="fmt" id="fmt-png" value="png">
            <label for="fmt-png">PNG</label>
          </div>
          <div class="quality-wrap" id="q-wrap">
            <span class="s-label" style="margin-top:12px;display:block">JPG quality</span>
            <div class="q-row">
              <input type="range" id="q-slider" min="1" max="100" value="80">
              <span class="q-val" id="q-val">80</span>
            </div>
          </div>
        </div>

        <button id="btn-process" disabled>
          <span class="prog" id="prog"></span>
          <span id="btn-lbl">Process &amp; download</span>
        </button>

      </div>
    </div>

    <div>
      <div class="list-head">
        <div class="list-title">
          Queue
          <span class="n-badge" id="n-badge">0</span>
        </div>
        <button class="clear-btn" id="clear-btn">clear all</button>
      </div>
      <div id="empty-state" class="empty-state">
        <div class="empty-glyph">[ ]</div>
        <div class="empty-text">no images loaded yet</div>
      </div>
      <div class="img-list" id="img-list" style="display:none"></div>
    </div>

  </div>
</div>

<script>
(() => {
  const SK = 'blogresize_v1';
  const files = [];
  let uid = 0;

  const dropzone      = document.getElementById('dropzone');
  const fileInput     = document.getElementById('file-input');
  const pickBtn       = document.getElementById('pick-btn');
  const imgList       = document.getElementById('img-list');
  const emptyState    = document.getElementById('empty-state');
  const nBadge        = document.getElementById('n-badge');
  const btnProcess    = document.getElementById('btn-process');
  const btnLbl        = document.getElementById('btn-lbl');
  const prog          = document.getElementById('prog');
  const gW            = document.getElementById('g-w');
  const gH            = document.getElementById('g-h');
  const renameBase    = document.getElementById('rename-base');
  const renamePreview = document.getElementById('rename-preview');
  const clearBtn      = document.getElementById('clear-btn');
  const qWrap         = document.getElementById('q-wrap');
  const qSlider       = document.getElementById('q-slider');
  const qVal          = document.getElementById('q-val');
  const fmtJpg        = document.getElementById('fmt-jpg');
  const fmtPng        = document.getElementById('fmt-png');

  // ── Settings persistence ──
  function loadSettings() {
    try {
      const s = JSON.parse(localStorage.getItem(SK) || '{}');
      if (s.w) gW.value = s.w;
      if (s.h) gH.value = s.h;
    } catch(e) {}
  }

  function saveSettings() {
    try {
      localStorage.setItem(SK, JSON.stringify({ w: gW.value, h: gH.value }));
    } catch(e) {}
  }

  // ── Preview & quality visibility ──
  function updatePreview() {
    const base = renameBase.value.trim() || 'image';
    const ext  = fmtPng.checked ? 'png' : 'jpg';
    qWrap.style.display = fmtJpg.checked ? 'block' : 'none';
    renamePreview.innerHTML = `&rarr; <strong>${esc(base)}-1</strong>.${ext}, <strong>${esc(base)}-2</strong>.${ext} &hellip;`;
    updateOutNames();
  }

  // Refresh output name labels in existing list rows without full re-render
  function updateOutNames() {
    const base = renameBase.value.trim() || 'image';
    const ext  = fmtPng.checked ? 'png' : 'jpg';
    files.forEach((entry, i) => {
      const el = document.getElementById('out-' + entry.id);
      if (el) el.textContent = `\u2192 ${base}-${i + 1}.${ext}`;
    });
  }

  // ── File input ──
  pickBtn.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });
  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover',  e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('drag-over');
    addFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
  });
  fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });
  clearBtn.addEventListener('click', () => { files.length = 0; render(); updateBtn(); });

  function addFiles(list) {
    list.forEach(f => {
      const entry = { id: uid++, file: f, img: null, origW: null, origH: null, done: false };
      files.push(entry);
      preloadThumb(entry);
    });
    render(); updateBtn();
  }

  function preloadThumb(entry) {
    const url = URL.createObjectURL(entry.file);
    const img = new Image();
    entry.thumbReady = new Promise((res, rej) => {
      img.onload = () => {
        entry.img = img; entry.origW = img.naturalWidth; entry.origH = img.naturalHeight;
        const el = document.getElementById('dim-' + entry.id);
        if (el) el.textContent = img.naturalWidth + '\xd7' + img.naturalHeight;
        URL.revokeObjectURL(url); res();
      };
      img.onerror = rej;
    });
    img.src = url;
  }

  // ── Setting change listeners ──
  [gW, gH].forEach(el => el.addEventListener('input', saveSettings));
  renameBase.addEventListener('input', updatePreview);
  fmtJpg.addEventListener('change', updatePreview);
  fmtPng.addEventListener('change', updatePreview);
  qSlider.addEventListener('input', () => { qVal.textContent = qSlider.value; });

  // ── Render ──
  function render() {
    const base = renameBase.value.trim() || 'image';
    const ext  = fmtPng.checked ? 'png' : 'jpg';

    if (!files.length) {
      emptyState.style.display = 'block'; imgList.style.display = 'none';
      nBadge.textContent = '0'; nBadge.classList.remove('has'); return;
    }
    emptyState.style.display = 'none'; imgList.style.display = 'flex';
    nBadge.textContent = files.length; nBadge.classList.add('has');
    imgList.innerHTML = '';

    files.forEach((entry, i) => {
      const outName  = `${base}-${i + 1}.${ext}`;
      const size     = fmtBytes(entry.file.size);
      const thumbUrl = URL.createObjectURL(entry.file);
      const row      = document.createElement('div');
      row.className  = 'img-row' + (entry.done ? ' done' : '');
      row.id         = 'row-' + entry.id;
      row.innerHTML  = `
        <img class="thumb" src="${thumbUrl}" onload="URL.revokeObjectURL(this.src)">
        <div class="img-info">
          <div class="img-name" title="${esc(entry.file.name)}">${esc(entry.file.name)}</div>
          <div class="img-out" id="out-${entry.id}">\u2192 ${esc(outName)}</div>
          <div class="img-meta">
            <span id="dim-${entry.id}">${entry.origW ? entry.origW + '\xd7' + entry.origH : '\u2026'}</span>
            <span>${size}</span>
            ${entry.done ? '<span class="tag done">downloaded</span>' : ''}
          </div>
        </div>
        <div class="row-actions">
          <span class="status-dot${entry.done ? ' done' : ''}" id="dot-${entry.id}"></span>
          <button class="act-btn rm" onclick="removeFile(${entry.id})">&#x2715;</button>
        </div>`;
      imgList.appendChild(row);
    });
  }

  function updateBtn() {
    btnProcess.disabled  = !files.length;
    btnLbl.textContent   = files.length ? `Process & download (${files.length})` : 'Process & download';
  }

  window.removeFile = id => {
    const i = files.findIndex(f => f.id === id);
    if (i !== -1) files.splice(i, 1);
    render(); updateBtn();
  };

  // ── Process ──
  btnProcess.addEventListener('click', async () => {
    if (!files.length) return;
    btnProcess.disabled = true;
    prog.style.width    = '0%';

    const isJpg   = fmtJpg.checked;
    const mime    = isJpg ? 'image/jpeg' : 'image/png';
    const ext     = isJpg ? 'jpg' : 'png';
    const quality = isJpg ? parseInt(qSlider.value) / 100 : undefined;
    const targetW = parseInt(gW.value) || null;
    const targetH = parseInt(gH.value) || null;
    const base    = renameBase.value.trim() || 'image';

    for (let i = 0; i < files.length; i++) {
      const entry = files[i];
      setDot(entry.id, 'processing');
      await tick();
      try {
        if (!entry.img) await entry.thumbReady;
        const { w, h } = calcDims(entry.origW, entry.origH, targetW, targetH);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(entry.img, 0, 0, w, h);
        const blob = await new Promise(r => canvas.toBlob(r, mime, quality));
        dl(blob, `${base}-${i + 1}.${ext}`);
        entry.done = true;
        setDot(entry.id, 'done');
      } catch(err) {
        console.error(err);
        setDot(entry.id, 'error');
      }
      prog.style.width = ((i + 1) / files.length * 100) + '%';
      await tick();
    }

    btnProcess.disabled = false;
    files.length = 0;
    render();
    updateBtn();
  });

  // ── Helpers ──
  function calcDims(ow, oh, tw, th) {
    if (tw && th) return { w: tw, h: th };
    if (tw)       return { w: tw, h: Math.round(oh * tw / ow) };
    if (th)       return { w: Math.round(ow * th / oh), h: th };
    return { w: ow, h: oh };
  }

  function setDot(id, state) {
    const el = document.getElementById('dot-' + id);
    if (el) el.className = 'status-dot ' + state;
  }

  function dl(blob, name) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  }

  function tick() { return new Promise(r => setTimeout(r, 80)); }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function fmtBytes(b) {
    if (b < 1024)    return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(2) + ' MB';
  }

  // ── Init ──
  loadSettings();
  updatePreview();
  updateBtn();
})();
</script>
</body>
</html>
