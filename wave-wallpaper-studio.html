<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driftfield — Wave Wallpaper Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #121016;
    --panel: #1a1720;
    --panel-2: #201c28;
    --border: #2c2734;
    --text: #ece7f3;
    --muted: #948da3;
    --accent: #b28df0;
    --accent-dim: #6d5490;
    --accent-soft: rgba(178,141,240,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  header{
    padding: 22px 28px 18px;
    border-bottom: 1px solid var(--border);
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap: 16px;
    flex-wrap:wrap;
  }
  .brand{ display:flex; align-items:baseline; gap:12px; }
  .brand h1{
    font-family:'Fraunces', serif;
    font-optical-sizing:auto;
    font-weight:600;
    font-size: 22px;
    margin:0;
    letter-spacing: 0.2px;
  }
  .brand span.mark{
    display:inline-block;
    width: 10px; height:10px;
    border-radius: 3px;
    background: linear-gradient(135deg, var(--accent), #4c3a70);
  }
  .brand .tag{
    color: var(--muted);
    font-size: 13px;
  }
  .fingerprint{
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 6px;
  }
  .fingerprint b{ color: var(--accent); font-weight:500; }

  main{
    flex:1;
    display:flex;
    min-height:0;
  }

  .stage{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 36px;
    min-width:0;
    position:relative;
  }
  .stage::before{
    content:"";
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 20% 10%, rgba(178,141,240,0.05), transparent 40%);
    pointer-events:none;
  }
  .canvas-frame{
    position:relative;
    border-radius: 14px;
    overflow:hidden;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.7), 0 0 0 1px var(--border);
    max-width:100%;
    max-height: calc(100vh - 160px);
    line-height:0;
  }
  canvas{
    display:block;
    max-width: 100%;
    max-height: calc(100vh - 160px);
    width:auto;
    height:auto;
    background:#000;
  }
  .loading{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background: rgba(18,16,22,0.55);
    font-family:'JetBrains Mono', monospace;
    font-size:12px; color: var(--muted);
    opacity:0; pointer-events:none;
    transition: opacity .15s ease;
  }
  .loading.active{ opacity:1; }

  aside{
    width: 336px;
    flex-shrink:0;
    border-left: 1px solid var(--border);
    background: var(--panel);
    overflow-y:auto;
    padding: 22px 22px 40px;
  }
  .section{ margin-bottom: 26px; }
  .section h2{
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    margin: 0 0 12px;
    font-weight:600;
  }

  .palette-grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .swatch{
    position:relative;
    border-radius: 8px;
    height: 46px;
    cursor:pointer;
    border: 1.5px solid var(--border);
    overflow:hidden;
    transition: transform .12s ease, border-color .12s ease;
  }
  .swatch:hover{ transform: translateY(-1px); }
  .swatch.active{ border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .swatch .name{
    position:absolute; bottom:0; left:0; right:0;
    font-size: 9px;
    text-align:center;
    padding: 3px 2px;
    background: rgba(0,0,0,0.35);
    color: #fff;
    letter-spacing:0.3px;
  }
  .custom-colors{
    display:flex; gap:10px; margin-top:12px;
    align-items:center;
  }
  .color-pick{ display:flex; flex-direction:column; gap:4px; align-items:flex-start; }
  .color-pick label{ font-size:11px; color:var(--muted); }
  .color-pick input[type=color]{
    width: 40px; height: 28px; border:none; border-radius:6px; background:none; cursor:pointer;
    padding:0; border:1px solid var(--border);
  }
  .use-custom-btn{
    align-self:flex-end;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12px;
    padding: 7px 12px;
    border-radius: 6px;
    cursor:pointer;
    font-family:'Inter';
    height: 28px;
    margin-top: 15px;
  }
  .use-custom-btn:hover{ border-color: var(--accent-dim); }

  .field{ margin-bottom: 16px; }
  .field-row{
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom: 6px;
  }
  .field-row label{ font-size: 13px; color: var(--text); }
  .field-row .val{ font-size: 12px; color: var(--muted); font-family:'JetBrains Mono', monospace; }
  input[type=range]{
    -webkit-appearance:none; appearance:none;
    width:100%; height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:14px; height:14px; border-radius:50%;
    background: var(--accent);
    cursor:pointer;
    border: 2px solid #14121a;
    box-shadow: 0 0 0 1px var(--accent);
  }
  input[type=range]::-moz-range-thumb{
    width:14px; height:14px; border-radius:50%;
    background: var(--accent); border: 2px solid #14121a; cursor:pointer;
  }

  select{
    width:100%;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 9px 10px;
    border-radius: 7px;
    font-size: 13px;
    font-family: 'Inter';
    cursor:pointer;
  }

  .toggle-row{
    display:flex; align-items:center; justify-content:space-between;
    padding: 9px 0;
    font-size: 13px;
  }
  .switch{
    position:relative; width:36px; height:20px; flex-shrink:0;
  }
  .switch input{ opacity:0; width:0; height:0; }
  .slider-tog{
    position:absolute; cursor:pointer; inset:0;
    background: var(--border);
    border-radius: 20px;
    transition: .15s;
  }
  .slider-tog::before{
    content:""; position:absolute; height:14px; width:14px; left:3px; top:3px;
    background: var(--muted); border-radius:50%; transition:.15s;
  }
  .switch input:checked + .slider-tog{ background: var(--accent-dim); }
  .switch input:checked + .slider-tog::before{ transform: translateX(16px); background: var(--accent); }

  .btn-row{ display:flex; gap:10px; margin-top: 4px; }
  .btn{
    flex:1;
    padding: 11px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight:500;
    font-family:'Inter';
    cursor:pointer;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    display:flex; align-items:center; justify-content:center; gap:6px;
    transition: border-color .12s, background .12s;
  }
  .btn:hover{ border-color: var(--accent-dim); }
  .btn.primary{
    background: linear-gradient(135deg, var(--accent), #7856b8);
    border: none;
    color: #16101f;
    font-weight:600;
  }
  .btn.primary:hover{ filter: brightness(1.06); }
  .btn svg{ width:14px; height:14px; }

  .seed-row{ display:flex; gap:8px; }
  .seed-row input[type=text]{
    flex:1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 9px 10px;
    border-radius: 7px;
  }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background: var(--border); border-radius: 4px; }

  @media (max-width: 860px){
    main{ flex-direction: column; }
    aside{ width:auto; border-left:none; border-top:1px solid var(--border); }
    .stage{ padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="mark"></span>
    <h1>Driftfield</h1>
    <span class="tag">generative wave wallpapers</span>
  </div>
  <div class="fingerprint">seed <b id="fpSeed">—</b> · <span id="fpTag">—</span></div>
</header>

<main>
  <div class="stage">
    <div class="canvas-frame">
      <canvas id="canvas" width="1920" height="1200"></canvas>
      <div class="loading" id="loading">rendering…</div>
    </div>
  </div>

  <aside>
    <div class="section">
      <h2>Palette</h2>
      <div class="palette-grid" id="paletteGrid"></div>
      <div class="custom-colors">
        <div class="color-pick">
          <label>Light</label>
          <input type="color" id="customLight" value="#e7d6ff">
        </div>
        <div class="color-pick">
          <label>Dark</label>
          <input type="color" id="customDark" value="#140a2b">
        </div>
        <button class="use-custom-btn" id="useCustom">Use custom</button>
      </div>
    </div>

    <div class="section">
      <h2>Terrain</h2>
      <div class="field">
        <div class="field-row"><label>Layers</label><span class="val" id="vLayers">7</span></div>
        <input type="range" id="layers" min="3" max="10" step="1" value="7">
      </div>
      <div class="field">
        <div class="field-row"><label>Wave height</label><span class="val" id="vAmp">55</span></div>
        <input type="range" id="amp" min="10" max="100" step="1" value="55">
      </div>
      <div class="field">
        <div class="field-row"><label>Turbulence</label><span class="val" id="vTurb">2</span></div>
        <input type="range" id="turb" min="1" max="5" step="1" value="2">
      </div>
      <div class="field">
        <div class="field-row"><label>Horizon</label><span class="val" id="vHorizon">30</span></div>
        <input type="range" id="horizon" min="0" max="60" step="1" value="30">
      </div>
    </div>

    <div class="section">
      <h2>Atmosphere</h2>
      <div class="field">
        <div class="field-row"><label>Edge softness</label><span class="val" id="vSoft">14</span></div>
        <input type="range" id="soft" min="0" max="40" step="1" value="14">
      </div>
      <div class="field">
        <div class="field-row"><label>Grain</label><span class="val" id="vGrain">10</span></div>
        <input type="range" id="grain" min="0" max="40" step="1" value="10">
      </div>
      <div class="toggle-row">
        <span>Light glow</span>
        <label class="switch"><input type="checkbox" id="glow" checked><span class="slider-tog"></span></label>
      </div>
      <div class="field" id="glowPosWrap">
        <div class="field-row"><label>Glow position</label></div>
        <select id="glowPos">
          <option value="top-right" selected>Top right</option>
          <option value="top-left">Top left</option>
          <option value="top-center">Top center</option>
          <option value="center">Center</option>
        </select>
      </div>
    </div>

    <div class="section">
      <h2>Canvas</h2>
      <div class="field">
        <select id="resolution">
          <option value="1920x1200">Desktop 16:10 — 1920×1200</option>
          <option value="2560x1440">Desktop 16:9 — 2560×1440</option>
          <option value="3440x1440">Ultrawide — 3440×1440</option>
          <option value="1600x1600">Square — 1600×1600</option>
          <option value="1170x2532">Phone — 1170×2532</option>
        </select>
      </div>
    </div>

    <div class="section">
      <h2>Seed</h2>
      <div class="seed-row">
        <input type="text" id="seedInput" value="">
        <button class="btn" id="randomizeBtn" title="New random seed">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        </button>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn primary" id="downloadBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PNG
      </button>
    </div>
  </aside>
</main>

<script>
(function(){
  // ---------- RNG ----------
  function mulberry32(a){
    return function(){
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function hashSeedString(str){
    let h = 1779033703 ^ str.length;
    for (let i = 0; i < str.length; i++){
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    return (h ^ (h >>> 16)) >>> 0;
  }

  // ---------- Color helpers ----------
  function hexToRgb(hex){
    hex = hex.replace('#','');
    if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
    const n = parseInt(hex, 16);
    return { r: (n>>16)&255, g: (n>>8)&255, b: n&255 };
  }
  function rgbToCss(c, a){ return a===undefined ? `rgb(${c.r},${c.g},${c.b})` : `rgba(${c.r},${c.g},${c.b},${a})`; }
  function lerp(a,b,t){ return a + (b-a)*t; }
  function lerpColor(c1, c2, t){
    return { r: lerp(c1.r,c2.r,t), g: lerp(c1.g,c2.g,t), b: lerp(c1.b,c2.b,t) };
  }
  function rampColor(stops, t){
    // stops: array of {r,g,b}, t in [0,1]
    const n = stops.length - 1;
    const seg = Math.min(Math.floor(t * n), n - 1);
    const localT = (t * n) - seg;
    return lerpColor(stops[seg], stops[seg+1], localT);
  }

  // ---------- Palettes (light -> dark, 4 stops each) ----------
  const PALETTES = {
    amethyst: { name:'Amethyst Dusk', stops: ['#e9d8ff','#b98ce8','#7a4fc2','#180a2e'] },
    ember:    { name:'Sunset Ember',  stops: ['#ffe3c2','#ff9d6c','#d9456e','#2a0a2c'] },
    ocean:    { name:'Deep Ocean',    stops: ['#d4f1ff','#5fb8e0','#1c6ea4','#031225'] },
    emerald:  { name:'Emerald Field', stops: ['#e2ffe8','#7fd8a0','#279066','#04241c'] },
    midnight: { name:'Midnight Indigo', stops: ['#c9d4ff','#6c7edb','#33368f','#080318'] },
    rosequartz:{ name:'Rose Quartz',  stops: ['#ffe8f2','#f5a8c8','#c85f95','#2c0e24'] },
  };

  let currentPaletteKey = 'amethyst';
  let customStops = null;

  function activeStops(){
    if (currentPaletteKey === 'custom' && customStops) return customStops;
    return PALETTES[currentPaletteKey].stops.map(hexToRgb);
  }

  // ---------- State ----------
  const state = {
    layers: 7,
    amp: 55,
    turb: 2,
    horizon: 30,
    soft: 14,
    grain: 10,
    glow: true,
    glowPos: 'top-right',
    resolution: '1920x1200',
    seed: Math.floor(Math.random()*1e9)
  };

  // ---------- DOM refs ----------
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const loading = document.getElementById('loading');
  const fpSeed = document.getElementById('fpSeed');
  const fpTag = document.getElementById('fpTag');
  const seedInput = document.getElementById('seedInput');

  // ---------- Build palette grid ----------
  const paletteGrid = document.getElementById('paletteGrid');
  Object.keys(PALETTES).forEach(key => {
    const p = PALETTES[key];
    const el = document.createElement('div');
    el.className = 'swatch' + (key === currentPaletteKey ? ' active' : '');
    el.style.background = `linear-gradient(160deg, ${p.stops[0]}, ${p.stops[1]} 40%, ${p.stops[2]} 70%, ${p.stops[3]})`;
    el.dataset.key = key;
    const label = document.createElement('div');
    label.className = 'name';
    label.textContent = p.name;
    el.appendChild(label);
    el.addEventListener('click', () => {
      currentPaletteKey = key;
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      render();
    });
    paletteGrid.appendChild(el);
  });

  document.getElementById('useCustom').addEventListener('click', () => {
    const light = document.getElementById('customLight').value;
    const dark = document.getElementById('customDark').value;
    const lightRgb = hexToRgb(light), darkRgb = hexToRgb(dark);
    customStops = [
      lightRgb,
      lerpColor(lightRgb, darkRgb, 0.4),
      lerpColor(lightRgb, darkRgb, 0.7),
      darkRgb
    ];
    currentPaletteKey = 'custom';
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    render();
  });

  // ---------- Wire sliders ----------
  function bindRange(id, valId, key, fmt){
    const el = document.getElementById(id);
    const val = document.getElementById(valId);
    el.addEventListener('input', () => {
      state[key] = Number(el.value);
      val.textContent = fmt ? fmt(state[key]) : state[key];
      render();
    });
  }
  bindRange('layers','vLayers','layers');
  bindRange('amp','vAmp','amp');
  bindRange('turb','vTurb','turb');
  bindRange('horizon','vHorizon','horizon');
  bindRange('soft','vSoft','soft');
  bindRange('grain','vGrain','grain');

  document.getElementById('glow').addEventListener('change', (e) => {
    state.glow = e.target.checked;
    document.getElementById('glowPosWrap').style.opacity = state.glow ? '1' : '0.4';
    render();
  });
  document.getElementById('glowPos').addEventListener('change', (e) => {
    state.glowPos = e.target.value;
    render();
  });
  document.getElementById('resolution').addEventListener('change', (e) => {
    state.resolution = e.target.value;
    render();
  });

  seedInput.addEventListener('change', () => {
    const raw = seedInput.value.trim();
    state.seed = raw === '' ? Math.floor(Math.random()*1e9) : hashSeedString(raw);
    render();
  });
  document.getElementById('randomizeBtn').addEventListener('click', () => {
    state.seed = Math.floor(Math.random()*1e9);
    seedInput.value = state.seed;
    render();
  });

  document.getElementById('downloadBtn').addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = `driftfield-${state.seed}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  // ---------- Wave layer generation ----------
  function buildLayers(rng, w, h){
    const n = state.layers;
    const stops = activeStops();
    const horizonFrac = state.horizon / 100; // top empty sky fraction
    const usableTop = h * horizonFrac;
    const usableHeight = h - usableTop;

    const layers = [];
    for (let i = 0; i < n; i++){
      const t = n === 1 ? 1 : i / (n - 1); // 0 = farthest/lightest, 1 = nearest/darkest
      // baseline spreads across the usable band, with slight jitter, biased toward bottom for later layers
      const spread = usableTop + usableHeight * (0.12 + 0.8 * Math.pow(t, 0.85));
      const jitter = (rng() - 0.5) * usableHeight * 0.06;
      const baseline = spread + jitter;

      const amp = (h * (state.amp/1000)) * (0.5 + t * 1.1) * (0.7 + rng()*0.6);

      const harmonics = [];
      const numHarmonics = 1 + state.turb; // turbulence -> more sine components
      let weightSum = 0;
      for (let hI = 0; hI < numHarmonics; hI++){
        const freq = (0.5 + hI * 0.9 + rng()*0.6) ; // cycles across width
        const phase = rng() * Math.PI * 2;
        const weight = 1 / (hI + 1.4);
        weightSum += weight;
        harmonics.push({ freq, phase, weight });
      }
      harmonics.forEach(hm => hm.weight /= weightSum);

      const color = rampColor(stops, t);
      layers.push({ baseline, amp, harmonics, color, t });
    }
    return layers;
  }

  function waveY(layer, xFrac, w){
    let sum = 0;
    for (const hm of layer.harmonics){
      sum += Math.sin(xFrac * Math.PI * 2 * hm.freq + hm.phase) * hm.weight;
    }
    return layer.baseline + sum * layer.amp;
  }

  function drawLayer(ctx, layer, w, h, samples){
    ctx.beginPath();
    ctx.moveTo(0, h);
    for (let s = 0; s <= samples; s++){
      const xFrac = s / samples;
      const x = xFrac * w;
      const y = waveY(layer, xFrac, w);
      if (s === 0) ctx.lineTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.lineTo(w, h);
    ctx.closePath();

    // subtle vertical sheen within the wave band
    const grad = ctx.createLinearGradient(0, layer.baseline - layer.amp, 0, h);
    const c = layer.color;
    const lighter = { r: Math.min(255, c.r+18), g: Math.min(255, c.g+14), b: Math.min(255, c.b+20) };
    grad.addColorStop(0, rgbToCss(lighter));
    grad.addColorStop(1, rgbToCss(c));
    ctx.fillStyle = grad;

    if (state.soft > 0){
      ctx.shadowColor = rgbToCss(c, 0.9);
      ctx.shadowBlur = state.soft;
    } else {
      ctx.shadowBlur = 0;
    }
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawGlow(ctx, w, h, rng, stops){
    let cx, cy;
    switch(state.glowPos){
      case 'top-left': cx = w*0.18; cy = h*0.05; break;
      case 'top-center': cx = w*0.5; cy = h*0.02; break;
      case 'center': cx = w*0.5; cy = h*0.35; break;
      default: cx = w*0.82; cy = h*0.08; break; // top-right
    }
    const radius = Math.max(w,h) * 0.62;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
    const light = stops[0];
    grad.addColorStop(0, rgbToCss(light, 0.55));
    grad.addColorStop(0.35, rgbToCss(light, 0.18));
    grad.addColorStop(1, rgbToCss(light, 0));
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
  }

  function applyGrain(ctx, w, h, rng, amount){
    if (amount <= 0) return;
    const imgData = ctx.getImageData(0, 0, w, h);
    const d = imgData.data;
    const strength = amount * 0.9;
    for (let i = 0; i < d.length; i += 4){
      const n = (rng() - 0.5) * strength;
      d[i]   = Math.max(0, Math.min(255, d[i] + n));
      d[i+1] = Math.max(0, Math.min(255, d[i+1] + n));
      d[i+2] = Math.max(0, Math.min(255, d[i+2] + n));
    }
    ctx.putImageData(imgData, 0, 0);
  }

  // ---------- Main render ----------
  function render(){
    loading.classList.add('active');
    requestAnimationFrame(() => {
      const [w, h] = state.resolution.split('x').map(Number);
      canvas.width = w;
      canvas.height = h;

      const rng = mulberry32(state.seed);
      const stops = activeStops();

      // background sky gradient
      const bgGrad = ctx.createLinearGradient(0, 0, 0, h);
      bgGrad.addColorStop(0, rgbToCss(stops[0]));
      bgGrad.addColorStop(0.55, rgbToCss(lerpColor(stops[0], stops[1], 0.6)));
      bgGrad.addColorStop(1, rgbToCss(stops[1]));
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, w, h);

      if (state.glow) drawGlow(ctx, w, h, rng, stops);

      const layers = buildLayers(rng, w, h);
      const samples = Math.max(60, Math.floor(w / 14));
      layers.forEach(layer => drawLayer(ctx, layer, w, h, samples));

      applyGrain(ctx, w, h, rng, state.grain);

      // fingerprint readout
      fpSeed.textContent = state.seed;
      const tagName = currentPaletteKey === 'custom' ? 'CUSTOM' : PALETTES[currentPaletteKey].name.toUpperCase().replace(/\s+/g,'-');
      fpTag.textContent = `${tagName} · L${state.layers} · ${w}×${h}`;

      loading.classList.remove('active');
    });
  }

  // init
  seedInput.value = state.seed;
  render();
})();
</script>
